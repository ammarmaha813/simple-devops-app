apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-devops-app
  labels:
    app: simple-devops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-devops-app
  template:
    metadata:
      labels:
        app: simple-devops-app
    spec:
      containers:
        - name: simple-devops-app
          image: simple-devops-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
