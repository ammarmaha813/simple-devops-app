apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: simple-devops-app
  labels:
    app: simple-devops-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: simple-devops-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
