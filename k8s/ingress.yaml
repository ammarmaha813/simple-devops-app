apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-devops-app
  labels:
    app: simple-devops-app
spec:
  ingressClassName: nginx
  rules:
    - host: simple-devops-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: simple-devops-app
                port:
                  number: 80
